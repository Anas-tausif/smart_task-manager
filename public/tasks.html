<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tasks - Smart Task Manager</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: linear-gradient(90deg, #007bff, #6610f2);
      color: white;
    }

    .nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
      background: white;
    }

    th {
      background: #007bff;
      color: white;
      padding: 12px;
    }

    td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    .completed-row {
      background-color: #d4edda;
    }

    button {
      padding: 6px 10px;
      margin: 2px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .edit-btn { background: #ffc107; }
    .delete-btn { background: #dc3545; color: white; }

    select {
      padding: 5px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="nav">
  <h3>Smart Task Manager</h3>
  <div>
    <a href="dashboard.html">Dashboard</a>
    <a href="tasks.html">Tasks</a>
    <a href="profile.html">Profile</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

<div class="container" style="max-width: 1100px;">
  <h2>Manage Your Tasks</h2>

  <!-- Add Task Form -->
  <form id="taskForm">
    <input type="text" id="title" placeholder="Task Title" required>
    <input type="text" id="description" placeholder="Description">
    <input type="date" id="due_date">
    <button type="submit" class="btn">Add Task</button>
  </form>

  <!-- Tasks Table -->
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="taskTableBody"></tbody>
  </table>
</div>

<script>
const token = localStorage.getItem("token");
if (!token) window.location.href = "login.html";

const tableBody = document.getElementById("taskTableBody");

// ================= LOAD TASKS =================
async function loadTasks() {
  const response = await fetch("/api/tasks", {
    headers: { "Authorization": "Bearer " + token }
  });

  const tasks = await response.json();
  tableBody.innerHTML = "";

  tasks.forEach(task => {
    const row = document.createElement("tr");

    if (task.status === "completed") {
      row.classList.add("completed-row");
    }

    row.innerHTML = `
      <td>${task.title}</td>
      <td>${task.description || ""}</td>
      <td>${task.due_date ? task.due_date.split("T")[0] : ""}</td>
      <td>
        <select onchange="changeStatus(${task.id}, this.value)">
          <option value="pending" ${task.status === "pending" ? "selected" : ""}>Pending</option>
          <option value="completed" ${task.status === "completed" ? "selected" : ""}>Completed</option>
        </select>
      </td>
      <td>
        <button class="edit-btn" onclick="editTask(${task.id}, '${task.title}', '${task.description}', '${task.due_date ? task.due_date.split("T")[0] : ""}')">Edit</button>
        <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
      </td>
    `;

    tableBody.appendChild(row);
  });
}

// ================= ADD TASK =================
document.getElementById("taskForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const due_date = document.getElementById("due_date").value;

  await fetch("/api/tasks", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ title, description, due_date })
  });

  document.getElementById("taskForm").reset();
  loadTasks();
});

// ================= CHANGE STATUS =================
async function changeStatus(id, newStatus) {
  await fetch(`/api/tasks/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ status: newStatus })
  });

  loadTasks();
}

// ================= EDIT TASK =================
async function editTask(id, oldTitle, oldDesc, oldDate) {
  const title = prompt("Edit Title:", oldTitle);
  const description = prompt("Edit Description:", oldDesc);
  const due_date = prompt("Edit Due Date (YYYY-MM-DD):", oldDate);

  await fetch(`/api/tasks/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ title, description, due_date })
  });

  loadTasks();
}

// ================= DELETE =================
async function deleteTask(id) {
  if (!confirm("Are you sure you want to delete this task?")) return;

  await fetch(`/api/tasks/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  loadTasks();
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

loadTasks();
</script>

</body>
</html>
